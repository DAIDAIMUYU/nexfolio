<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fafaf8" />
    <meta
      name="description"
      content="NexFolio 是一个个人数字平台，用于展示项目作品、博客记录、工具入口和持续构建的数字产品。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NexFolio" />
    <meta property="og:title" content="NexFolio | 个人数字平台" />
    <meta
      property="og:description"
      content="聚合项目、博客、工具与个人方向的现代浅色暖调作品集主站。"
    />
    <meta property="og:url" content="https://nexfolio-one.vercel.app/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="NexFolio | 个人数字平台" />
    <meta name="twitter:description" content="项目作品、博客记录、工具入口与个人数字产品总入口。" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Avoid theme flash: apply saved theme before first paint.
         Defaults to 'light' — only goes dark if user has explicitly toggled. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          document.documentElement.dataset.theme = stored === 'dark' ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>

    <!-- Fonts are self-hosted via @fontsource (imported in src/main.tsx). -->

    <title>NexFolio | 个人数字平台</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
